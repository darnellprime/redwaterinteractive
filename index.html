<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Southern Street Stories | Redwater Interactive</title>

  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>

<body>

<header class="navbar">
  <div>
    <h1>REDWATER INTERACTIVE</h1>
    <p>Southern Street Stories</p>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>SOUTHERN STREET STORIES</h1>
    <p>A cinematic open-world crime drama</p>
  </div>
</section>

<!-- CHARACTERS -->
<section class="characters">

  <h2>The Faces Of Redwater</h2>

  <div class="character-grid">

    <div class="card" data-character="jalen">
      <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e">
      <div class="label">Jalen Reed</div>
    </div>

    <div class="card" data-character="marcus">
      <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d">
      <div class="label">Marcus Reed</div>
    </div>

    <div class="card" data-character="amara">
      <img src="https://images.unsplash.com/photo-1504593811423-6dd665756598">
      <div class="label">Amara Vaughn</div>
    </div>

  </div>
</section>

<!-- CHARACTER MODAL -->
<div id="characterModal" class="modal hidden">

  <div class="modal-overlay"></div>

  <div class="modal-content">

    <button id="closeModal">×</button>

    <h2 id="charName"></h2>
    <p id="charRole"></p>

    <div class="modal-body">

      <div class="modal-text">
        <h3>Backstory</h3>
        <p id="charStory"></p>

        <h3>Connection</h3>
        <p id="charConnection"></p>
      </div>

    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
